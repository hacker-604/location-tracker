<!DOCTYPE html>
<html>
<head><title>Live Movement Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>#map{height:100vh;}</style>
</head>
<body>
<div id="map"></div>
<script>
const map = L.map('map').setView([0,0],2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let path = [];
const URL = 'https://senator-handcraft-kisser.ngrok-free.dev/locations'; // CHANGE THIS
setInterval(async()=>{
    try{
        const res = await fetch(URL);
        const data = await res.json();
        if(data.length){
            const last = data[data.length-1];
            const lat = parseFloat(last.latitude), lng = parseFloat(last.longitude);
            if(!isNaN(lat)&&!isNaN(lng)){
                path.push([lat,lng]);
                if(window.polyline) map.removeLayer(window.polyline);
                window.polyline = L.polyline(path, {color:'red'}).addTo(map);
                map.fitBounds(window.polyline.getBounds());
                if(window.marker) map.removeLayer(window.marker);
                window.marker = L.marker([lat,lng]).addTo(map);
            }
        }
    }catch(e){}
},2000);
</script>
</body>
</html>
